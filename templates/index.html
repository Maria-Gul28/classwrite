<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassWrite | Collaborative Writing Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Socket.IO client — required for real-time live progress -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #faf6f0;
            min-height: 100vh;
            color: #1a1510;
        }

        /* ENTRY SCREEN */
        #entryScreen {
            position: fixed;
            inset: 0;
            background: #faf6f0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c4a882' fill-opacity='0.12'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        .entry-card {
            background: white;
            border-radius: 32px;
            padding: 56px 64px;
            box-shadow: 0 20px 48px rgba(26, 21, 16, 0.12);
            text-align: center;
            max-width: 560px;
            width: 90%;
            border: 1px solid #e0d4c4;
        }

        .entry-logo { font-family: 'Lora', serif; font-size: 2.8rem; color: #1a1510; letter-spacing: -0.02em; margin-bottom: 8px; }
        .entry-logo span { color: #c47a3a; }
        .entry-tagline { font-size: 0.85rem; color: #8a7a6e; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 48px; }
        .entry-question { font-family: 'Lora', serif; font-size: 1.2rem; color: #4a3f35; margin-bottom: 32px; }
        .entry-choices { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }

        .choice-btn {
            flex: 1; min-width: 180px; padding: 24px 16px;
            border-radius: 24px; border: 2px solid #e0d4c4;
            background: #faf6f0; cursor: pointer;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            font-family: 'DM Sans', sans-serif;
        }
        .choice-btn:hover { border-color: #c47a3a; background: white; transform: translateY(-6px); box-shadow: 0 16px 24px rgba(0,0,0,0.05); }
        .choice-icon { font-size: 2.5rem; display: block; margin-bottom: 12px; }
        .choice-label { font-size: 1.1rem; font-weight: 600; color: #1a1510; display: block; }
        .choice-sub { font-size: 0.75rem; color: #8a7a6e; display: block; margin-top: 6px; }

        /* CONNECTION STATUS BANNER */
        #connectionBanner {
            position: fixed; top: 0; left: 0; right: 0;
            background: #e8a020; color: white;
            text-align: center; padding: 8px; font-size: 0.8rem;
            font-weight: 600; z-index: 99999;
            display: none; letter-spacing: 0.05em;
        }
        #connectionBanner.show { display: block; }
        #connectionBanner.connected { background: #5c7a6a; }

        /* MODAL */
        .modal-overlay { position: fixed; inset: 0; background: rgba(26,21,16,0.6); backdrop-filter: blur(6px); display: none; align-items: center; justify-content: center; z-index: 11000; }
        .modal-overlay.active { display: flex; }
        .modal-box { background: white; border-radius: 28px; padding: 44px 48px; width: 90%; max-width: 460px; box-shadow: 0 32px 64px rgba(0,0,0,0.2); animation: modalSlideIn 0.2s ease; }
        @keyframes modalSlideIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
        .modal-title { font-family: 'Lora', serif; font-size: 1.6rem; color: #1a1510; margin-bottom: 8px; }
        .modal-sub { font-size: 0.85rem; color: #8a7a6e; margin-bottom: 28px; }
        .field-group { margin-bottom: 20px; }
        .field-label { font-size: 0.75rem; font-weight: 600; color: #4a3f35; letter-spacing: 0.08em; text-transform: uppercase; display: block; margin-bottom: 8px; }
        .field-input { width: 100%; padding: 14px 16px; border: 1.5px solid #e0d4c4; border-radius: 16px; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; background: #fefaf5; transition: all 0.2s; outline: none; }
        .field-input:focus { border-color: #c47a3a; background: white; box-shadow: 0 0 0 3px rgba(196,122,58,0.1); }
        .modal-btn { width: 100%; padding: 14px; background: #1a1510; color: #faf6f0; border: none; border-radius: 40px; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: all 0.2s; margin-top: 8px; }
        .modal-btn:hover { background: #c47a3a; transform: translateY(-2px); }
        .modal-btn.secondary { background: transparent; color: #1a1510; border: 1.5px solid #e0d4c4; }
        .modal-btn.secondary:hover { border-color: #1a1510; background: #faf6f0; transform: translateY(-2px); }
        .modal-error { background: #fdeaea; color: #a03030; padding: 12px; border-radius: 12px; font-size: 0.85rem; margin-bottom: 16px; display: none; }

        /* APP SHELL */
        #appShell { display: none; min-height: 100vh; }
        .top-bar { height: 70px; background: rgba(255,255,255,0.95); border-bottom: 1px solid #e0d4c4; display: flex; align-items: center; justify-content: space-between; padding: 0 32px; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .top-bar-logo { font-family: 'Lora', serif; font-size: 1.5rem; font-weight: 600; }
        .top-bar-logo span { color: #c47a3a; }
        .user-badge { display: flex; align-items: center; gap: 10px; background: #faf6f0; padding: 6px 16px 6px 12px; border-radius: 40px; font-size: 0.85rem; font-weight: 500; }
        .sign-out-btn { padding: 8px 18px; background: none; border: 1.5px solid #e0d4c4; border-radius: 40px; font-weight: 500; cursor: pointer; transition: 0.2s; }
        .sign-out-btn:hover { border-color: #a03030; color: #a03030; }

        /* LIVE INDICATOR */
        .live-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #5c7a6a; margin-right: 6px; animation: livePulse 1.5s infinite; }
        @keyframes livePulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.85); } }

        .main-layout { display: flex; min-height: calc(100vh - 70px); }
        .sidebar { width: 280px; background: white; border-right: 1px solid #e0d4c4; padding: 32px 20px; position: sticky; top: 70px; height: calc(100vh - 70px); overflow-y: auto; }
        .sidebar-section-label { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #8a7a6e; margin-bottom: 16px; }
        .sidebar-btn { display: flex; align-items: center; gap: 12px; width: 100%; padding: 12px 16px; background: none; border: none; border-radius: 14px; font-size: 0.9rem; color: #4a3f35; cursor: pointer; transition: 0.2s; margin-bottom: 4px; font-weight: 500; }
        .sidebar-btn:hover { background: #faf6f0; color: #1a1510; }
        .sidebar-btn.active { background: #f0e8dc; color: #1a1510; font-weight: 600; }

        .content { flex: 1; padding: 40px 48px; max-width: 1100px; overflow-y: auto; }
        .page { display: none; animation: fadeIn 0.25s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        .page-title { font-family: 'Lora', serif; font-size: 2rem; color: #1a1510; margin-bottom: 6px; }
        .page-subtitle { color: #8a7a6e; margin-bottom: 32px; font-size: 0.9rem; }

        .card { background: white; border: 1px solid #e0d4c4; border-radius: 24px; padding: 28px 32px; margin-bottom: 28px; box-shadow: 0 2px 12px rgba(0,0,0,0.02); transition: box-shadow 0.2s; }
        .card-title { font-family: 'Lora', serif; font-size: 1.2rem; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }

        .form-group { margin-bottom: 20px; }
        .form-label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #4a3f35; margin-bottom: 8px; display: block; }
        .form-input, .form-textarea, .form-select { width: 100%; padding: 12px 16px; border: 1.5px solid #e0d4c4; border-radius: 16px; font-family: 'DM Sans', sans-serif; background: #fefaf5; transition: 0.2s; outline: none; }
        .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: #c47a3a; background: white; }

        .btn { padding: 10px 20px; border-radius: 40px; font-weight: 600; font-size: 0.85rem; border: none; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: #1a1510; color: white; }
        .btn-primary:hover { background: #c47a3a; transform: translateY(-2px); }
        .btn-success { background: #5c7a6a; color: white; }
        .btn-success:hover { background: #3e5a4c; transform: translateY(-2px); }
        .btn-ghost { background: #faf6f0; border: 1.5px solid #e0d4c4; }

        .tag-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
        .tag { background: #f0e8dc; padding: 5px 12px; border-radius: 30px; font-size: 0.8rem; display: inline-flex; align-items: center; gap: 6px; }
        .tag-remove { background: none; border: none; cursor: pointer; color: #8a7a6e; }

        .assignment-card { background: white; border: 1px solid #e0d4c4; border-radius: 20px; padding: 20px 24px; margin-bottom: 16px; cursor: pointer; transition: 0.2s; }
        .assignment-card:hover { border-color: #c47a3a; transform: translateY(-3px); box-shadow: 0 12px 24px rgba(0,0,0,0.05); }
        .assignment-card-title { font-family: 'Lora', serif; font-size: 1.1rem; margin-bottom: 8px; }
        .assignment-card-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

        .badge { background: #f0e8dc; color: #4a3f35; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }

        .work-item { background: #fefaf5; border-left: 4px solid #c47a3a; padding: 16px 20px; border-radius: 14px; margin-bottom: 12px; }

        /* Live progress — student tabs */
        .student-tabs-bar {
            display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 28px;
        }
        .student-tab {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 18px; border-radius: 40px;
            border: 1.5px solid #e0d4c4; background: white;
            cursor: pointer; font-family: 'DM Sans', sans-serif;
            font-size: 0.88rem; font-weight: 500; color: #4a3f35;
            transition: all 0.2s; position: relative;
        }
        .student-tab:hover { border-color: #c47a3a; background: #fefaf5; transform: translateY(-2px); box-shadow: 0 8px 16px rgba(0,0,0,0.06); }
        .student-tab.active { background: #1a1510; color: white; border-color: #1a1510; }
        .student-tab .tab-dot { width: 8px; height: 8px; border-radius: 50%; background: #5c7a6a; flex-shrink: 0; animation: livePulse 1.5s infinite; }
        .student-tab.active .tab-dot { background: #c47a3a; }
        .student-tab .tab-words { font-size: 0.72rem; opacity: 0.7; }

        /* Live progress card */
        .progress-card { background: white; border: 1px solid #e0d4c4; border-radius: 20px; padding: 20px 24px; margin-bottom: 16px; transition: 0.2s; }
        .progress-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .progress-student { font-weight: 600; font-size: 1rem; }
        .progress-time { font-size: 0.75rem; color: #8a7a6e; }
        .progress-preview {
            font-family: 'Lora', serif; font-size: 0.9rem; color: #4a3f35;
            line-height: 1.75; background: #fefaf5; padding: 16px 20px;
            border-radius: 12px; white-space: pre-wrap; word-break: break-word;
        }
        .progress-chars { font-size: 0.75rem; color: #8a7a6e; margin-top: 8px; }

        /* Image upload area */
        .image-upload-area {
            border: 2px dashed #e0d4c4; border-radius: 16px; padding: 20px;
            text-align: center; cursor: pointer; transition: 0.2s; background: #fefaf5;
            margin-bottom: 12px;
        }
        .image-upload-area:hover { border-color: #c47a3a; background: white; }
        .image-upload-area.drag-over { border-color: #c47a3a; background: #fdf5ec; }
        .image-thumb-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .image-thumb { position: relative; width: 90px; height: 90px; border-radius: 12px; overflow: hidden; border: 1.5px solid #e0d4c4; }
        .image-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .image-thumb-remove { position: absolute; top: 4px; right: 4px; width: 20px; height: 20px; border-radius: 50%; background: rgba(26,21,16,0.7); color: white; border: none; cursor: pointer; font-size: 0.65rem; display: flex; align-items: center; justify-content: center; }
        .resource-image-display { border-radius: 14px; max-width: 100%; margin-bottom: 12px; border: 1px solid #e0d4c4; }
        .resource-images-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }

        .writing-area { width: 100%; min-height: 380px; padding: 20px; font-family: 'Lora', serif; font-size: 1rem; line-height: 1.7; border: 1.5px solid #e0d4c4; border-radius: 20px; resize: vertical; background: white; }

        .autosave-indicator { display: flex; align-items: center; gap: 8px; font-size: 0.75rem; color: #8a7a6e; }
        .autosave-dot { width: 8px; height: 8px; border-radius: 50%; background: #aaa; }
        .autosave-dot.saved { background: #5c7a6a; }
        .autosave-dot.saving { background: #c47a3a; animation: pulse 0.8s infinite; }
        @keyframes pulse { 0% { opacity: 0.4; } 100% { opacity: 1; } }

        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 32px; }
        .stat-card { background: white; border: 1px solid #e0d4c4; border-radius: 24px; padding: 24px; text-align: center; }
        .stat-number { font-family: 'Lora', serif; font-size: 2.4rem; font-weight: 600; }
        .stat-label { font-size: 0.8rem; color: #8a7a6e; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }

        .empty-state { text-align: center; padding: 48px 24px; color: #8a7a6e; }
        .empty-state-icon { font-size: 3rem; margin-bottom: 16px; display: block; }

        /* Loading spinner */
        .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid #e0d4c4; border-top-color: #c47a3a; border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1510; color: white; padding: 12px 28px; border-radius: 60px; font-size: 0.85rem; z-index: 20000; opacity: 0; transition: opacity 0.25s; pointer-events: none; }
        #toast.show { opacity: 1; }

        @media (max-width: 700px) {
            .sidebar { width: 220px; }
            .content { padding: 24px; }
            .stats-row { grid-template-columns: 1fr; }
            .entry-card { padding: 36px 28px; }
        }
    </style>
</head>
<body>

<!-- CONNECTION BANNER -->
<div id="connectionBanner">⚡ Connecting to server...</div>

<!-- ENTRY SCREEN -->
<div id="entryScreen">
    <div class="entry-card">
        <div class="entry-logo">Class<span>Write</span></div>
        <div class="entry-tagline">Collaborative Writing Studio</div>
        <div class="entry-question">Who are you joining as?</div>
        <div class="entry-choices">
            <button class="choice-btn" id="teacherChoiceBtn">
                <span class="choice-icon">🎓</span>
                <span class="choice-label">Teacher</span>
                <span class="choice-sub">Create &amp; monitor</span>
            </button>
            <button class="choice-btn" id="studentChoiceBtn">
                <span class="choice-icon">✍️</span>
                <span class="choice-label">Student</span>
                <span class="choice-sub">Write &amp; submit</span>
            </button>
        </div>
    </div>
</div>

<!-- TEACHER MODAL -->
<div class="modal-overlay" id="teacherModal">
    <div class="modal-box">
        <div class="modal-title">Teacher Access</div>
        <div class="modal-sub">Sign in to your classroom</div>
        <div class="modal-error" id="teacherError">Invalid email or password</div>
        <div class="field-group">
            <label class="field-label">Email</label>
            <input class="field-input" type="email" id="teacherEmail" placeholder="maria_gul28@yahoo.com">
        </div>
        <div class="field-group">
            <label class="field-label">Password</label>
            <input class="field-input" type="password" id="teacherPassword" placeholder="Password">
        </div>
        <button class="modal-btn" id="confirmTeacherBtn">Sign In →</button>
        <button class="modal-btn secondary" id="closeTeacherModal">← Back</button>
    </div>
</div>

<!-- STUDENT MODAL -->
<div class="modal-overlay" id="studentModal">
    <div class="modal-box">
        <div class="modal-title">Student Entry</div>
        <div class="modal-sub">Enter your name and a 4-digit PIN</div>
        <div class="modal-error" id="studentError"></div>
        <div class="field-group">
            <label class="field-label">Full Name</label>
            <input class="field-input" id="studentName" placeholder="e.g., Sara Khan">
        </div>
        <div class="field-group">
            <label class="field-label">4-Digit PIN</label>
            <input class="field-input" id="studentPin" maxlength="4" placeholder="1234" pattern="[0-9]{4}">
        </div>
        <button class="modal-btn" id="confirmStudentBtn">Enter Classroom →</button>
        <button class="modal-btn secondary" id="closeStudentModal">← Back</button>
    </div>
</div>

<!-- APP SHELL -->
<div id="appShell">
    <div class="top-bar">
        <div class="top-bar-logo">Class<span>Write</span></div>
        <div style="display:flex;gap:16px;align-items:center;">
            <div class="user-badge" id="userBadge">👤 Guest</div>
            <button class="sign-out-btn" id="signOutBtn">Sign out</button>
        </div>
    </div>
    <div class="main-layout">
        <nav class="sidebar" id="sidebarNav"></nav>
        <main class="content" id="mainContent"></main>
    </div>
</div>

<div id="toast"></div>

<script>
// ============================================================
//  STATE
// ============================================================
let currentRole = null;
let currentStudent = null;
let currentStudentPin = null;
let currentAssignmentId = null;
let autoSaveTimer = null;

// In-memory data (loaded fresh from server on each login)
let assignments = [];
let submissions = [];
let studentWorks = {}; // { "StudentName_assignmentId": { ... } }

// ============================================================
//  SOCKET.IO  — real-time connection to Flask backend
// ============================================================
const socket = io({ transports: ['websocket', 'polling'] });

socket.on('connect', () => {
    console.log('[Socket] Connected:', socket.id);
    hideBanner();
});

socket.on('disconnect', () => {
    console.log('[Socket] Disconnected');
    showBanner('⚠️ Lost connection to server — trying to reconnect...', false);
});

socket.on('connect_error', () => {
    showBanner('⚠️ Cannot reach server. Make sure Flask is running on port 5000.', false);
});

// Teacher receives these from server when a student updates progress
socket.on('progress_update', (data) => {
    const key = `${data.student_name}_${data.assignment_id}`;
    studentWorks[key] = data;
    const activeSidebarBtn = document.querySelector('.sidebar-btn.active');
    if (currentRole === 'teacher' && activeSidebarBtn && activeSidebarBtn.dataset.page === 'progress') {
        if (activeProgressTab === key) {
            const previewEl = document.getElementById('progressPreviewText');
            const card = document.getElementById('activeStudentCard');
            if (previewEl) {
                const fullContent = data.content || '';
                previewEl.textContent = fullContent;
                const charCount = fullContent.length;
                const wordCount = fullContent.trim().split(/\s+/).filter(Boolean).length;
                const charsEl = card ? card.querySelector('.progress-chars') : null;
                if (charsEl) charsEl.textContent = `${wordCount} word${wordCount===1?'':'s'} · ${charCount} characters`;
                const timeEl = card ? card.querySelector('.progress-time') : null;
                if (timeEl) timeEl.textContent = `Last update: ${new Date(data.last_updated||Date.now()).toLocaleTimeString()}`;
            } else {
                renderLiveProgress();
            }
        } else {
            renderLiveProgress();
        }
    }
});

// Teacher receives this when a student submits
socket.on('submission_update', (data) => {
    const existing = submissions.findIndex(s => s.student_name === data.student_name && s.assignment_id === data.assignment_id);
    if (existing !== -1) submissions[existing] = data;
    else submissions.push(data);

    // Remove from active writers
    const key = `${data.student_name}_${data.assignment_id}`;
    delete studentWorks[key];

    if (currentRole === 'teacher') {
        showToast(`📬 ${data.student_name} submitted!`);
        const activeSidebarBtn = document.querySelector('.sidebar-btn.active');
        if (activeSidebarBtn) {
            const page = activeSidebarBtn.dataset.page;
            if (page === 'submissions') renderSubmissions();
            else if (page === 'progress') renderLiveProgress();
            else if (page === 'overview') renderTeacherOverview();
        }
    }
});

// Teacher receives this when a student joins
socket.on('student_joined', (data) => {
    if (currentRole === 'teacher') {
        showToast(`👋 ${data.student_name} joined assignment #${data.assignment_id}`);
    }
});

// ============================================================
//  CONNECTION BANNER HELPERS
// ============================================================
function showBanner(msg, isConnected = false) {
    const b = document.getElementById('connectionBanner');
    b.textContent = msg;
    b.className = 'show' + (isConnected ? ' connected' : '');
}
function hideBanner() {
    document.getElementById('connectionBanner').className = '';
}

// ============================================================
//  API HELPERS  — all data goes through Flask, not localStorage
// ============================================================
async function apiFetch(url, options = {}) {
    try {
        const res = await fetch(url, {
            headers: { 'Content-Type': 'application/json' },
            ...options
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.json();
    } catch (err) {
        console.error('[API Error]', url, err);
        showToast('⚠️ Server error — check Flask is running');
        return null;
    }
}

// Load all classroom data from server

            <div class="card">
                <div class="card-title">Details</div>
                <div class="form-group"><label class="form-label">Title</label><input class="form-input" id="newTitle" placeholder="e.g., Descriptive writing..."></div>

        </div>

    let resourcesArr = [], criteriaArr = [];
    const updateResUI  = () => { document.getElementById('resList').innerHTML  = resourcesArr.map((r,i)=>`<span class="tag">📌 ${r} <button class="tag-remove" data-i="${i}" data-t="res">✕</button></span>`).join(''); };
    const updateCritUI = () => { document.getElementById('critList').innerHTML = criteriaArr.map((c,i)=>`<span class="tag">◆ ${c} <button class="tag-remove" data-i="${i}" data-t="crit">✕</button></span>`).join(''); };

    document.getElementById('addResBtn').onclick  = () => { const v = document.getElementById('resInput').value.trim();  if(v){ resourcesArr.push(v);  updateResUI();  document.getElementById('resInput').value=''; } };
    document.getElementById('addCritBtn').onclick = () => { const v = document.getElementById('critInput').value.trim(); if(v){ criteriaArr.push(v); updateCritUI(); document.getElementById('critInput').value=''; } };

    document.getElementById('resList').addEventListener('click', e => {
        if(e.target.classList.contains('tag-remove') && e.target.dataset.t==='res') { resourcesArr.splice(+e.target.dataset.i,1); updateResUI(); }
    });
    document.getElementById('critList').addEventListener('click', e => {
        if(e.target.classList.contains('tag-remove') && e.target.dataset.t==='crit') { criteriaArr.splice(+e.target.dataset.i,1); updateCritUI(); }
    });

    // --- Image Upload Logic ---
    let imagesArr = []; // stores base64 data URLs

    function renderImageThumbs() {
        const grid = document.getElementById('imageThumbGrid');
        if (!grid) return;
        grid.innerHTML = imagesArr.map((src, i) => `
            <div class="image-thumb">
                <img src="${src}" alt="Resource image ${i+1}">
                <button class="image-thumb-remove" data-i="${i}" title="Remove">✕</button>
            </div>`).join('');
        grid.querySelectorAll('.image-thumb-remove').forEach(btn => {
            btn.addEventListener('click', () => { imagesArr.splice(+btn.dataset.i, 1); renderImageThumbs(); });
        });
    }

    function processImageFiles(files) {
        const remaining = 5 - imagesArr.length;
        const toProcess = Array.from(files).slice(0, remaining);
        if (toProcess.length === 0) { showToast('Maximum 5 images allowed'); return; }
        toProcess.forEach(file => {
            if (!file.type.startsWith('image/')) return;
            const reader = new FileReader();
            reader.onload = e => { imagesArr.push(e.target.result); renderImageThumbs(); };
            reader.readAsDataURL(file);
        });
    }

    const dropZone = document.getElementById('imageDropZone');
    const fileInput = document.getElementById('imageFileInput');

    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => processImageFiles(e.target.files));

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        processImageFiles(e.dataTransfer.files);
    });

    document.getElementById('publishAssignmentBtn').onclick = async () => {
        const title    = document.getElementById('newTitle').value.trim();
        const question = document.getElementById('newQuestion').value.trim();
        const mindmap  = document.getElementById('newMindmap').value.trim();
        if (!title || !question) { showToast('Title and prompt are required'); return; }

        const btn = document.getElementById('publishAssignmentBtn');
        btn.innerHTML = '<span class="spinner"></span> Publishing…';
        btn.disabled = true;

        const result = await apiFetch('/api/assignments', {
            method: 'POST',
            body: JSON.stringify({ title, question, resources: resourcesArr, criteria: criteriaArr, mindmap, images: imagesArr })
        });

        if (result) {
            assignments.push(result);
            showToast(`✅ "${title}" published!`);
            // Switch to Assignments tab
            document.querySelector('.sidebar-btn[data-page="assignments"]').click();
        } else {
            btn.innerHTML = '📢 Publish Assignment';
            btn.disabled = false;
        }
    };
}

// Track which student tab is active in live progress
let activeProgressTab = null;

function renderLiveProgress(forceTab) {
    const content = document.getElementById('mainContent');
    const activeList = Object.values(studentWorks);

    if (activeList.length === 0) {
        activeProgressTab = null;
        content.innerHTML = `
            <div class="page active">
                <div class="page-title"><span class="live-dot"></span>Live Progress</div>
                <div class="page-subtitle">Updates appear here in real time as students write</div>
                <div class="card"><div class="empty-state"><span class="empty-state-icon">👀</span>No active writers right now</div></div>
            </div>`;
        return;
    }

    // Pick default tab if none selected or previous tab left
    if (forceTab) {
        activeProgressTab = forceTab;
    } else if (!activeProgressTab || !studentWorks[activeProgressTab]) {
        activeProgressTab = Object.keys(studentWorks)[0];
    }

    const w = studentWorks[activeProgressTab];
    const assignTitle = assignments.find(a => a.id === w.assignment_id)?.title || `Assignment #${w.assignment_id}`;
    const fullContent = (w.content || '');
    const charCount = fullContent.length;
    const wordCount = fullContent.trim().split(/\s+/).filter(Boolean).length;
    const updated = w.last_updated ? new Date(w.last_updated).toLocaleTimeString() : '';

    const tabsHtml = activeList.map(sw => {
        const key = `${sw.student_name}_${sw.assignment_id}`;
        const wc = (sw.content || '').trim().split(/\s+/).filter(Boolean).length;
        const isActive = key === activeProgressTab;
        return `<button class="student-tab ${isActive ? 'active' : ''}" data-key="${key}">
            <span class="tab-dot"></span>
            <span>${sw.student_name}</span>
            <span class="tab-words">${wc}w</span>
        </button>`;
    }).join('');

    content.innerHTML = `
        <div class="page active">
            <div class="page-title"><span class="live-dot"></span>Live Progress</div>
            <div class="page-subtitle">${activeList.length} student${activeList.length===1?'':'s'} writing now — click a name to view their work</div>
            <div class="student-tabs-bar">${tabsHtml}</div>
            <div class="progress-card" id="activeStudentCard">
                <div class="progress-card-header">
                    <div>
                        <div class="progress-student">✍️ ${w.student_name}</div>
                        <div style="font-size:0.78rem;color:#8a7a6e;margin-top:2px">${assignTitle}</div>
                    </div>
                    <div class="progress-time">Last update: ${updated}</div>
                </div>
                <div class="progress-preview" id="progressPreviewText">${fullContent.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
                <div class="progress-chars">${wordCount} word${wordCount===1?'':'s'} · ${charCount} characters</div>
            </div>
        </div>`;

    // Tab click handlers
    content.querySelectorAll('.student-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            activeProgressTab = tab.dataset.key;
            renderLiveProgress();
        });
    });
}

function openAssignment(id) {
    const assignment = assignments.find(a => a.id === id);
    if (!assignment) return;
    currentAssignmentId = id;

    // Notify server that student joined
    socket.emit('join_assignment', { student_name: currentStudent, assignment_id: id });

    // Pre-fill with any previously saved content (from server)
    const serverWork = studentWorks[`${currentStudent}_${id}`];
    const savedContent = serverWork?.content || '';

    const contentDiv = document.getElementById('mainContent');
    contentDiv.innerHTML = `
        <div class="page active">
            <button class="btn btn-ghost" id="backToAssignments" style="margin-bottom:20px">← Back</button>
            <div class="card">
                <div class="card-title">${assignment.title}</div>
                <div style="white-space:pre-wrap;line-height:1.7">${assignment.question}</div>
            </div>
            ${assignment.criteria?.length ? `<div class="card"><div class="card-title">✅ Success Criteria</div>${assignment.criteria.map(c=>`<div style="margin-bottom:6px">◆ ${c}</div>`).join('')}</div>` : ''}
            ${assignment.resources?.length ? `<div class="card"><div class="card-title">🔗 Resources</div>${assignment.resources.map(r=>`<a href="${r.startsWith('http')?r:'#'}" target="_blank" class="tag" style="margin-bottom:6px">🔗 ${r}</a>`).join(' ')}</div>` : ''}
            ${assignment.images?.length ? `<div class="card"><div class="card-title">🖼️ Resource Images</div><div class="resource-images-row">${assignment.images.map((src,i)=>`<img src="${src}" alt="Resource ${i+1}" class="resource-image-display" style="max-height:220px;object-fit:contain;">`).join('')}</div></div>` : ''}
            <div class="card">
                <div class="card-title">✍️ Your Writing</div>
                <textarea id="studentWritingArea" class="writing-area" rows="14" placeholder="Start writing here…">${savedContent.replace(/</g,'&lt;')}</textarea>
                <div style="display:flex;justify-content:space-between;align-items:center;margin-top:16px">
                    <div class="autosave-indicator">
                        <span id="saveStatusDot" class="autosave-dot saved"></span>
                        <span id="saveStatusText">All changes saved</span>
                    </div>
                    <button class="btn btn-success" id="submitWorkBtn">📤 Submit Assignment</button>
                </div>
            </div>
        </div>
    `;

    const textarea = document.getElementById('studentWritingArea');

    // Emit progress update via Socket.IO (real-time to teacher)
    const emitProgress = () => {
        socket.emit('update_progress', {
            student_name: currentStudent,
            assignment_id: id,
            content: textarea.value
        });
    };

    textarea.addEventListener('input', () => {
        if (autoSaveTimer) clearTimeout(autoSaveTimer);
        document.getElementById('saveStatusDot').className = 'autosave-dot saving';
        document.getElementById('saveStatusText').innerText = 'Saving…';
        autoSaveTimer = setTimeout(() => {
            emitProgress();
            document.getElementById('saveStatusDot').className = 'autosave-dot saved';
            document.getElementById('saveStatusText').innerText = 'All changes saved';
        }, 800);
    });

    document.getElementById('submitWorkBtn').onclick = async () => {
        const finalContent = textarea.value.trim();
        if (!finalContent) { showToast('Please write something before submitting'); return; }

        const btn = document.getElementById('submitWorkBtn');
        btn.innerHTML = '<span class="spinner"></span> Submitting…';
        btn.disabled = true;

        const result = await apiFetch('/api/submit', {
            method: 'POST',
            body: JSON.stringify({ student_name: currentStudent, assignment_id: id, content: finalContent })
        });

        if (result?.success) {
            // Update local cache
            const existing = submissions.findIndex(s => s.student_name===currentStudent && s.assignment_id===id);
            const sub = { student_name: currentStudent, assignment_id: id, content: finalContent, submitted_at: new Date().toISOString() };
            if (existing !== -1) submissions[existing] = sub;
            else submissions.push(sub);
            showToast('✨ Assignment submitted!');
            renderStudentAssignments();
        } else {
            btn.innerHTML = '📤 Submit Assignment';
            btn.disabled = false;
        }
    };

    document.getElementById('backToAssignments').onclick = () => renderStudentAssignments();
}

document.getElementById('teacherPassword').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('confirmTeacherBtn').click();
});

document.getElementById('confirmStudentBtn').onclick = async () => {
    const name = document.getElementById('studentName').value.trim();
    const pin  = document.getElementById('studentPin').value.trim();
    if (!name || !/^\d{4}$/.test(pin)) {
        document.getElementById('studentError').textContent = 'Enter your name and a valid 4-digit PIN';
        document.getElementById('studentError').style.display = 'block';
        return;
    }
    currentStudent    = name;
    currentStudentPin = pin;
    document.getElementById('studentModal').classList.remove('active');
    await enterAs('student');
    showToast(`Welcome, ${name}! ✍️`);
};

// Allow Enter key in student modal
document.getElementById('studentPin').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('confirmStudentBtn').click();
});

document.getElementById('signOutBtn').onclick = () => {
    currentRole = null; currentStudent = null; currentStudentPin = null;
    assignments = []; submissions = []; studentWorks = {};
    document.getElementById('appShell').style.display = 'none';
    document.getElementById('entryScreen').style.display = 'flex';
    showToast('Signed out');
};
</script>
</body>
</html>
