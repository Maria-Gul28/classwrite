services:
  - type: web
    name: classwrite
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: classwrite-db
          property: connectionString

databases:
  - name: classwrite-db
    plan: free